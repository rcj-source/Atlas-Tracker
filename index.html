<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Atlas Tracker</title>
  <style>
    :root{
      --bg:#000;
      --panel:rgba(255,255,255,.05);
      --panel-2:rgba(255,255,255,.03);
      --border:rgba(255,255,255,.10);
      --text:#fff;
      --muted:#a1a1aa;
      --soft:#71717a;
      --ok:#34d399;
      --bad:#f87171;
      --white:#fff;
      --black:#000;
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:Arial,Helvetica,sans-serif}
    body{
      min-height:100vh;
      background:
        radial-gradient(circle at top right, rgba(255,255,255,.08), transparent 28%),
        radial-gradient(circle at bottom left, rgba(255,255,255,.06), transparent 22%),
        #000;
    }

    .app{
      max-width:460px;
      margin:0 auto;
      min-height:100vh;
      padding:16px 16px 96px;
    }

    .header{
      position:sticky;
      top:0;
      z-index:20;
      margin:0 -16px;
      padding:12px 16px 16px;
      backdrop-filter:blur(20px);
      background:rgba(0,0,0,.82);
      border-bottom:1px solid var(--border);
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
    }

    .logo{
      width:44px;
      height:44px;
      border-radius:16px;
      background:#fff;
      color:#000;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:20px;
      font-weight:700;
      flex-shrink:0;
    }

    .brand h1{
      margin:0;
      font-size:16px;
    }

    .brand p{
      margin:4px 0 0;
      font-size:12px;
      color:var(--muted);
    }

    .btn{
      border:1px solid var(--border);
      background:var(--panel);
      color:var(--text);
      border-radius:16px;
      padding:12px 14px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      cursor:pointer;
      text-decoration:none;
      font-size:14px;
    }

    .btn:disabled{
      opacity:.5;
      cursor:not-allowed;
    }

    .btn.white{
      background:#fff;
      color:#000;
    }

    .search-wrap{
      margin-top:14px;
      position:relative;
    }

    .search{
      width:100%;
      padding:14px 14px 14px 42px;
      border-radius:18px;
      border:1px solid var(--border);
      background:var(--panel);
      color:#fff;
      outline:none;
      font-size:14px;
    }

    .search::placeholder,
    input::placeholder{
      color:var(--soft);
    }

    .search-icon{
      position:absolute;
      left:14px;
      top:50%;
      transform:translateY(-50%);
      color:var(--soft);
      font-size:14px;
    }

    .screen{
      display:none;
      margin-top:18px;
      gap:16px;
      flex-direction:column;
    }

    .screen.active{
      display:flex;
    }

    .card{
      border:1px solid var(--border);
      background:var(--panel);
      border-radius:28px;
      overflow:hidden;
    }

    .card-header{
      padding:18px 18px 10px;
    }

    .card-title{
      margin:0;
      font-size:18px;
      font-weight:700;
    }

    .card-desc{
      margin:6px 0 0;
      font-size:13px;
      color:var(--muted);
      line-height:1.45;
    }

    .card-body{
      padding:0 18px 18px;
    }

    .stats{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    .stat{
      border:1px solid var(--border);
      background:var(--panel);
      border-radius:24px;
      padding:16px;
    }

    .stat-label{
      font-size:12px;
      color:var(--muted);
    }

    .stat-value{
      margin-top:8px;
      font-size:22px;
      font-weight:700;
    }

    .stat-sub{
      margin-top:8px;
      font-size:12px;
      color:var(--muted);
    }

    .empty{
      text-align:center;
      padding:34px 22px;
      border:1px dashed var(--border);
      background:var(--panel-2);
      border-radius:28px;
    }

    .empty-icon{
      width:56px;
      height:56px;
      margin:0 auto 16px;
      border-radius:22px;
      display:flex;
      align-items:center;
      justify-content:center;
      border:1px solid var(--border);
      background:var(--panel);
      font-size:24px;
    }

    .empty h3{
      margin:0;
      font-size:20px;
    }

    .empty p{
      margin:10px auto 0;
      max-width:320px;
      color:var(--muted);
      font-size:14px;
      line-height:1.5;
    }

    .empty .btn{
      margin-top:18px;
    }

    .field{
      display:flex;
      flex-direction:column;
      gap:8px;
      margin-bottom:14px;
    }

    .field label{
      font-size:13px;
      color:var(--muted);
    }

    .input{
      width:100%;
      padding:14px;
      border-radius:18px;
      border:1px solid var(--border);
      background:var(--panel);
      color:#fff;
      outline:none;
      font-size:14px;
    }

    .chain-grid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:8px;
    }

    .chain-btn{
      border:1px solid var(--border);
      background:var(--panel);
      color:#fff;
      padding:12px 10px;
      border-radius:16px;
      font-size:13px;
      cursor:pointer;
    }

    .chain-btn.active{
      background:#fff;
      color:#000;
    }

    .error{
      margin-top:12px;
      padding:12px 14px;
      border-radius:16px;
      border:1px solid rgba(248,113,113,.2);
      background:rgba(248,113,113,.10);
      color:#fca5a5;
      font-size:13px;
      line-height:1.45;
      word-break:break-word;
    }

    .success{
      margin-top:12px;
      padding:12px 14px;
      border-radius:16px;
      border:1px solid rgba(52,211,153,.2);
      background:rgba(52,211,153,.10);
      color:#86efac;
      font-size:13px;
    }

    .wallet-list{
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .wallet-item{
      border:1px solid var(--border);
      background:rgba(0,0,0,.3);
      border-radius:24px;
      padding:16px;
    }

    .wallet-top{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:flex-start;
    }

    .wallet-main{
      min-width:0;
      flex:1;
    }

    .wallet-name{
      display:flex;
      align-items:center;
      gap:8px;
      font-weight:700;
      flex-wrap:wrap;
    }

    .badge{
      border:1px solid var(--border);
      background:rgba(255,255,255,.10);
      padding:4px 8px;
      border-radius:999px;
      font-size:11px;
      color:#fff;
    }

    .wallet-address{
      margin-top:6px;
      color:var(--muted);
      font-size:13px;
      word-break:break-all;
    }

    .wallet-actions{
      display:flex;
      gap:8px;
      flex-shrink:0;
    }

    .icon-btn{
      width:40px;
      height:40px;
      border-radius:14px;
      border:1px solid var(--border);
      background:var(--panel);
      color:#fff;
      cursor:pointer;
    }

    .wallet-meta{
      margin-top:14px;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    .meta-box{
      border:1px solid var(--border);
      background:rgba(0,0,0,.3);
      border-radius:16px;
      padding:12px;
    }

    .meta-label{
      font-size:12px;
      color:var(--muted);
    }

    .meta-value{
      margin-top:6px;
      font-size:14px;
      font-weight:700;
    }

    .worker-note{
      margin-top:12px;
      padding:12px;
      border-radius:16px;
      border:1px solid var(--border);
      background:rgba(0,0,0,.3);
      color:var(--muted);
      font-size:13px;
      word-break:break-all;
    }

    .tabs{
      display:flex;
      gap:8px;
      overflow:auto;
      padding-bottom:2px;
    }

    .tab-btn{
      white-space:nowrap;
      border:1px solid var(--border);
      background:var(--panel);
      color:#fff;
      padding:10px 14px;
      border-radius:16px;
      font-size:13px;
      cursor:pointer;
    }

    .tab-btn.active{
      background:#fff;
      color:#000;
    }

    .nav{
      position:fixed;
      left:0;
      right:0;
      bottom:0;
      z-index:30;
      border-top:1px solid var(--border);
      background:rgba(0,0,0,.90);
      backdrop-filter:blur(20px);
      padding:12px;
    }

    .nav-inner{
      max-width:460px;
      margin:0 auto;
      display:flex;
      gap:8px;
    }

    .nav-btn{
      flex:1;
      min-width:0;
      border:none;
      background:var(--panel);
      color:#d4d4d8;
      border-radius:18px;
      padding:12px 8px;
      font-size:12px;
      cursor:pointer;
    }

    .nav-btn.active{
      background:#fff;
      color:#000;
      font-weight:700;
    }

    .muted{
      color:var(--muted);
    }

    .portfolio-total{
      font-size:34px;
      font-weight:800;
      margin-top:8px;
    }

    .portfolio-change{
      margin-top:8px;
      font-size:13px;
    }

    .portfolio-change.up{color:var(--ok)}
    .portfolio-change.down{color:var(--bad)}

    .chart-wrap{
      margin-top:14px;
      padding:14px;
      border:1px solid var(--border);
      background:rgba(0,0,0,.25);
      border-radius:20px;
    }

    .chart-svg{
      width:100%;
      height:140px;
      display:block;
    }

    .chart-labels{
      display:flex;
      justify-content:space-between;
      margin-top:8px;
      font-size:11px;
      color:var(--soft);
    }

    .asset-list{
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .asset-row{
      border:1px solid var(--border);
      background:rgba(0,0,0,.3);
      border-radius:20px;
      padding:14px;
    }

    .asset-top{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
    }

    .asset-name{
      font-weight:700;
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
    }

    .asset-symbol{
      font-size:12px;
      color:var(--muted);
      margin-top:4px;
    }

    .asset-right{
      text-align:right;
    }

    .asset-value{
      font-weight:800;
      font-size:15px;
    }

    .asset-amount{
      margin-top:4px;
      color:var(--muted);
      font-size:12px;
    }

    .asset-bar{
      margin-top:12px;
      height:8px;
      width:100%;
      border-radius:999px;
      background:rgba(255,255,255,.08);
      overflow:hidden;
    }

    .asset-bar-fill{
      height:100%;
      border-radius:999px;
      background:#fff;
    }

    .asset-footer{
      margin-top:8px;
      display:flex;
      justify-content:space-between;
      font-size:12px;
      color:var(--muted);
      gap:8px;
      flex-wrap:wrap;
    }

    @media (min-width: 900px){
      .app{
        max-width:900px;
      }
      .stats{
        grid-template-columns:repeat(4,1fr);
      }
      .nav-inner{
        max-width:460px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="topbar">
        <div class="brand">
          <div class="logo">₳</div>
          <div>
            <h1>Atlas Tracker</h1>
            <p>Mobile V1 · Multichain watcher</p>
          </div>
        </div>
        <button class="btn" id="headerAddBtn">＋ Add</button>
      </div>

      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input class="search" id="searchInput" placeholder="Search wallet alias or address" />
      </div>
    </header>

    <section id="dashboardScreen" class="screen active"></section>
    <section id="portfolioScreen" class="screen"></section>
    <section id="watchlistScreen" class="screen"></section>
    <section id="summaryScreen" class="screen"></section>
  </div>

  <nav class="nav">
    <div class="nav-inner">
      <button class="nav-btn active" data-screen="dashboard">Home</button>
      <button class="nav-btn" data-screen="portfolio">Portfolio</button>
      <button class="nav-btn" data-screen="watchlist">Watchlist</button>
      <button class="nav-btn" data-screen="summary">12h</button>
    </div>
  </nav>

  <script>
    const WORKER_BASE_URL = "https://bitter-sea-c49b.ramirezricardocontacto.workers.dev";
    const STORAGE_KEY = "atlas_tracker_watchers_v1";

    // Opcional: si tienes Demo API key de CoinGecko, pégala aquí.
    // Si la dejas vacía, el fallback de precios puede no funcionar en algunos navegadores/rate limits.
    const COINGECKO_DEMO_KEY = "";

    const SYMBOL_TO_COINGECKO_ID = {
      BTC: "bitcoin",
      ETH: "ethereum",
      SOL: "solana",
      USDT: "tether",
      USDC: "usd-coin",
      DAI: "dai",
      BONK: "bonk",
      WIF: "dogwifcoin",
      JUP: "jupiter-exchange-solana",
      PYTH: "pyth-network",
      RAY: "raydium",
      JTO: "jito-governance-token",
      ORCA: "orca",
      MEW: "cat-in-a-dogs-world",
      POPCAT: "popcat",
      FARTCOIN: "fartcoin"
    };

    const STABLES = new Set(["USDT", "USDC", "DAI", "USDS", "FDUSD", "TUSD"]);

    const state = {
      activeScreen: "dashboard",
      selectedChain: "All",
      query: "",
      loading: false,
      showSaved: false,
      formError: "",
      priceCache: {},
      newWatcher: {
        alias: "",
        address: "",
        chain: "Solana"
      },
      watchers: loadWatchers()
    };

    function loadWatchers() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : [];
      } catch {
        return [];
      }
    }

    function persistWatchers() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state.watchers));
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function validateAddress(address, chain) {
      const trimmed = address.trim();
      if (chain === "Ethereum") return /^0x[a-fA-F0-9]{40}$/.test(trimmed);
      if (chain === "Bitcoin") return /^(bc1|[13])[a-zA-HJ-NP-Z0-9]{20,74}$/.test(trimmed);
      return /^[1-9A-HJ-NP-Za-km-z]{32,44}$/.test(trimmed);
    }

    async function fetchWalletData(address, chain) {
      let endpoint = "";
      if (chain === "Solana") endpoint = `/solana?address=${encodeURIComponent(address)}`;
      if (chain === "Ethereum") endpoint = `/ethereum?address=${encodeURIComponent(address)}`;
      if (chain === "Bitcoin") endpoint = `/bitcoin?address=${encodeURIComponent(address)}`;

      const response = await fetch(`${WORKER_BASE_URL}${endpoint}`);
      let data;

      try {
        data = await response.json();
      } catch {
        throw new Error("La respuesta del worker no fue JSON válido.");
      }

      if (!response.ok || data?.success === false) {
        throw new Error(data?.error || "No se pudo consultar la wallet en el worker.");
      }

      return data;
    }

    async function fetchCoinGeckoPrices(symbols) {
      const ids = [...new Set(
        symbols
          .map(sym => SYMBOL_TO_COINGECKO_ID[sym])
          .filter(Boolean)
      )];

      const result = {};

      for (const sym of symbols) {
        if (STABLES.has(sym)) result[sym] = 1;
      }

      if (!ids.length) return result;

      const params = new URLSearchParams({
        ids: ids.join(","),
        vs_currencies: "usd",
        include_24hr_change: "true"
      });

      if (COINGECKO_DEMO_KEY) {
        params.set("x_cg_demo_api_key", COINGECKO_DEMO_KEY);
      }

      const url = `https://api.coingecko.com/api/v3/simple/price?${params.toString()}`;
      const response = await fetch(url);
      if (!response.ok) return result;

      const data = await response.json();

      for (const [symbol, id] of Object.entries(SYMBOL_TO_COINGECKO_ID)) {
        if (data[id]?.usd != null) {
          result[symbol] = Number(data[id].usd);
        }
      }

      return result;
    }

    function getTrackedChains() {
      return [...new Set(state.watchers.map(w => w.chain))];
    }

    function getFilteredWatchers() {
      const q = state.query.trim().toLowerCase();
      return state.watchers.filter(wallet => {
        const chainMatch = state.selectedChain === "All" || wallet.chain === state.selectedChain;
        const queryMatch =
          !q ||
          wallet.alias.toLowerCase().includes(q) ||
          wallet.address.toLowerCase().includes(q);
        return chainMatch && queryMatch;
      });
    }

    function pickFirstNumber(...values) {
      for (const v of values) {
        const n = Number(v);
        if (Number.isFinite(n) && n !== 0) return n;
      }
      return 0;
    }

    function parseSolanaAssets(raw) {
      const assets = [];
      const data = raw?.data || {};

      const nativeLamports =
        pickFirstNumber(
          data.nativeBalance,
          data.native_balance,
          data.lamports,
          data.solBalanceLamports
        );

      if (nativeLamports > 0) {
        assets.push({
          symbol: "SOL",
          name: "Solana",
          chain: "Solana",
          amount: nativeLamports / 1e9,
          price: 0,
          value: 0
        });
      }

      const tokenLists = [
        ...(Array.isArray(data.tokens) ? data.tokens : []),
        ...(Array.isArray(data.tokenBalances) ? data.tokenBalances : []),
        ...(Array.isArray(data.fungibleTokens) ? data.fungibleTokens : [])
      ];

      for (const token of tokenLists) {
        const amount =
          pickFirstNumber(
            token.amount,
            token.tokenAmount,
            token.balance,
            token.uiAmount,
            token.ui_amount,
            token.amount_ui
          );

        const price =
          pickFirstNumber(
            token.priceUsd,
            token.price_usd,
            token.usdPrice,
            token.price,
            token.tokenPrice
          );

        const value =
          pickFirstNumber(
            token.valueUsd,
            token.value_usd,
            token.usdValue,
            token.usd_value,
            token.quote,
            amount * price
          );

        const symbol =
          token.symbol ||
          token.tokenSymbol ||
          token.ticker ||
          token.metadata?.symbol ||
          "TOKEN";

        const name =
          token.name ||
          token.tokenName ||
          token.metadata?.name ||
          symbol;

        if (amount > 0 || value > 0) {
          assets.push({
            symbol,
            name,
            chain: "Solana",
            amount,
            price,
            value
          });
        }
      }

      return assets;
    }

    function parseEvmAssets(raw, chainLabel) {
      const items =
        raw?.data?.data?.items ||
        raw?.data?.items ||
        [];

      const assets = [];

      for (const item of items) {
        const balanceRaw = Number(item.balance || 0);
        const decimals = Number(item.contract_decimals ?? 18);
        const amount = balanceRaw / Math.pow(10, decimals);
        const price = pickFirstNumber(item.quote_rate, item.price, item.usd_rate);
        const value = pickFirstNumber(item.quote, item.value, amount * price);

        const symbol =
          item.contract_ticker_symbol ||
          item.ticker_symbol ||
          item.symbol ||
          "TOKEN";

        const name =
          item.contract_name ||
          item.name ||
          symbol;

        if (amount > 0 || value > 0) {
          assets.push({
            symbol,
            name,
            chain: chainLabel,
            amount,
            price,
            value
          });
        }
      }

      return assets;
    }

    function parseWatcherAssets(wallet) {
      if (!wallet.rawData) return [];
      if (wallet.chain === "Solana") return parseSolanaAssets(wallet.rawData);
      if (wallet.chain === "Ethereum") return parseEvmAssets(wallet.rawData, "Ethereum");
      if (wallet.chain === "Bitcoin") return parseEvmAssets(wallet.rawData, "Bitcoin");
      return [];
    }

    function getPortfolioAssets() {
      const all = [];

      for (const wallet of state.watchers) {
        const assets = parseWatcherAssets(wallet);
        for (const asset of assets) {
          if ((asset.amount || 0) <= 0 && (asset.value || 0) <= 0) continue;
          all.push(asset);
        }
      }

      const merged = {};
      for (const asset of all) {
        const key = `${asset.chain}:${asset.symbol}`;
        if (!merged[key]) {
          merged[key] = {
            symbol: asset.symbol,
            name: asset.name,
            chain: asset.chain,
            amount: 0,
            value: 0,
            price: 0
          };
        }

        merged[key].amount += Number(asset.amount || 0);
        merged[key].value += Number(asset.value || 0);
        if (asset.price) merged[key].price = Number(asset.price || 0);
      }

      const mergedAssets = Object.values(merged);

      for (const asset of mergedAssets) {
        if ((!asset.value || asset.value === 0) && asset.amount > 0) {
          if (STABLES.has(asset.symbol)) {
            asset.price = 1;
            asset.value = asset.amount;
          } else if (state.priceCache[asset.symbol]) {
            asset.price = state.priceCache[asset.symbol];
            asset.value = asset.amount * asset.price;
          }
        }
      }

      return mergedAssets.sort((a, b) => b.value - a.value);
    }

    async function refreshPriceCache() {
      const rawAssets = [];

      for (const wallet of state.watchers) {
        rawAssets.push(...parseWatcherAssets(wallet));
      }

      const symbols = [...new Set(rawAssets.map(a => a.symbol).filter(Boolean))];
      if (!symbols.length) return;

      try {
        const prices = await fetchCoinGeckoPrices(symbols);
        state.priceCache = { ...state.priceCache, ...prices };
      } catch {
        // silencio intencional
      }
    }

    function getPortfolioTotalValue() {
      return getPortfolioAssets().reduce((sum, asset) => sum + Number(asset.value || 0), 0);
    }

    function generatePortfolioSeries(total) {
      const base = total || 0;
      return [
        Math.max(base * 0.92, 0),
        Math.max(base * 0.95, 0),
        Math.max(base * 0.94, 0),
        Math.max(base * 0.98, 0),
        Math.max(base * 1.03, 0),
        Math.max(base * 1.01, 0),
        Math.max(base, 0)
      ];
    }

    function buildLinePath(values, width, height, padding) {
      if (!values.length) return "";
      const min = Math.min(...values);
      const max = Math.max(...values);
      const range = max - min || 1;
      const stepX = (width - padding * 2) / Math.max(values.length - 1, 1);

      return values.map((v, i) => {
        const x = padding + i * stepX;
        const y = height - padding - ((v - min) / range) * (height - padding * 2);
        return `${i === 0 ? "M" : "L"} ${x} ${y}`;
      }).join(" ");
    }

    function formatUsd(value) {
      return new Intl.NumberFormat("en-US", {
        style: "currency",
        currency: "USD",
        maximumFractionDigits: 2
      }).format(Number(value || 0));
    }

    function formatAmount(value) {
      return new Intl.NumberFormat("en-US", {
        maximumFractionDigits: 6
      }).format(Number(value || 0));
    }

    function setScreen(screen) {
      state.activeScreen = screen;
      document.querySelectorAll(".screen").forEach(el => el.classList.remove("active"));
      document.getElementById(`${screen}Screen`).classList.add("active");
      document.querySelectorAll(".nav-btn").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.screen === screen);
      });
      render();
    }

    function setChain(chain) {
      state.selectedChain = chain;
      render();
    }

    function updateFormField(field, value) {
      state.formError = "";
      state.newWatcher[field] = value;
    }

    function setFormChain(chain) {
      state.formError = "";
      state.newWatcher.chain = chain;
      render();
    }

    async function saveWatcher() {
      const alias = state.newWatcher.alias.trim();
      const address = state.newWatcher.address.trim();
      const chain = state.newWatcher.chain;

      if (!alias || !address) {
        state.formError = "Alias y wallet address son obligatorios.";
        render();
        return;
      }

      if (!validateAddress(address, chain)) {
        state.formError = `La dirección no parece válida para ${chain}.`;
        render();
        return;
      }

      const duplicated = state.watchers.some(
        wallet =>
          wallet.address.toLowerCase() === address.toLowerCase() &&
          wallet.chain === chain
      );

      if (duplicated) {
        state.formError = "Esa wallet ya está siendo trackeada.";
        render();
        return;
      }

      try {
        state.loading = true;
        state.formError = "";
        render();

        const blockchainData = await fetchWalletData(address, chain);

        state.watchers.unshift({
          alias,
          address,
          chain,
          change: 0,
          lastAction: "Fetched from blockchain",
          updated: "Just now",
          rawData: blockchainData
        });

        await refreshPriceCache();
        persistWatchers();

        state.newWatcher = {
          alias: "",
          address: "",
          chain: "Solana"
        };

        state.loading = false;
        state.showSaved = true;
        state.activeScreen = "watchlist";
        render();

        setTimeout(() => {
          state.showSaved = false;
          render();
        }, 2200);
      } catch (error) {
        state.loading = false;
        state.formError = error?.message || "No se pudo guardar y consultar la wallet.";
        render();
      }
    }

    function deleteWatcher(address, chain) {
      state.watchers = state.watchers.filter(
        wallet => !(wallet.address === address && wallet.chain === chain)
      );
      persistWatchers();
      render();
    }

    function renderDashboard() {
      const hasWallets = state.watchers.length > 0;
      const trackedChains = getTrackedChains();

      return `
        <div class="stats">
          <div class="stat">
            <div class="stat-label">Tracked Wallets</div>
            <div class="stat-value">${state.watchers.length}</div>
            <div class="stat-sub">${hasWallets ? `${trackedChains.length} chains selected` : "No wallets added yet"}</div>
          </div>
          <div class="stat">
            <div class="stat-label">Portfolio Value</div>
            <div class="stat-value">${hasWallets ? formatUsd(getPortfolioTotalValue()) : "$0"}</div>
            <div class="stat-sub">${hasWallets ? "Estimated with fallback prices" : "Add a wallet to begin tracking"}</div>
          </div>
          <div class="stat">
            <div class="stat-label">12h Changes</div>
            <div class="stat-value">${hasWallets ? "Preview" : "—"}</div>
            <div class="stat-sub">${hasWallets ? "Visual estimate only" : "No activity without wallets"}</div>
          </div>
          <div class="stat">
            <div class="stat-label">Chains Active</div>
            <div class="stat-value">${trackedChains.length}</div>
            <div class="stat-sub">${hasWallets ? escapeHtml(trackedChains.join(", ")) : "No chains selected yet"}</div>
          </div>
        </div>

        ${
          !hasWallets
            ? `
          <div class="empty">
            <div class="empty-icon">◈</div>
            <h3>No estás trackeando ninguna wallet</h3>
            <p>El dashboard arranca vacío. Agrega una wallet de Solana, Ethereum o Bitcoin.</p>
            <button class="btn white" onclick="setScreen('watchlist')">＋ Agregar primera wallet</button>
          </div>
        `
            : `
          <div class="card">
            <div class="card-header">
              <h3 class="card-title">Tracked wallets</h3>
              <p class="card-desc">Estas son las wallets actualmente registradas por el usuario.</p>
            </div>
            <div class="card-body">
              <div class="wallet-list">
                ${state.watchers
                  .map(
                    wallet => `
                  <div class="wallet-item">
                    <div class="wallet-top">
                      <div class="wallet-main">
                        <div class="wallet-name">
                          <span>${escapeHtml(wallet.alias)}</span>
                          <span class="badge">${escapeHtml(wallet.chain)}</span>
                        </div>
                        <div class="wallet-address">${escapeHtml(wallet.address)}</div>
                        <div class="worker-note">
                          ${escapeHtml(wallet.lastAction)}<br>
                          <span class="muted">Worker conectado · ${escapeHtml(wallet.rawData?.chain || wallet.chain)}</span>
                        </div>
                      </div>
                      <div class="wallet-actions">
                        <button class="icon-btn" onclick="deleteWatcher('${wallet.address}','${wallet.chain}')">🗑</button>
                      </div>
                    </div>
                  </div>
                `
                  )
                  .join("")}
              </div>
            </div>
          </div>
        `
        }
      `;
    }

    function renderPortfolio() {
      const hasWallets = state.watchers.length > 0;

      if (!hasWallets) {
        return `
          <div class="empty">
            <div class="empty-icon">◈</div>
            <h3>Aún no hay portfolio</h3>
            <p>La sección de portfolio permanece vacía hasta que agregues wallets.</p>
            <button class="btn white" onclick="setScreen('watchlist')">＋ Agregar wallet</button>
          </div>
        `;
      }

      const assets = getPortfolioAssets();
      const total = getPortfolioTotalValue();
      const series = generatePortfolioSeries(total);
      const path = buildLinePath(series, 320, 140, 12);
      const changePct = series[0] > 0 ? (((series[series.length - 1] - series[0]) / series[0]) * 100) : 0;
      const filteredAssets = assets.filter(asset => state.selectedChain === "All" || asset.chain === state.selectedChain);

      return `
        <div class="card">
          <div class="card-header">
            <h3 class="card-title">Portfolio value</h3>
            <p class="card-desc">Valor estimado en USD de todas tus monedas detectadas.</p>
            <div class="portfolio-total">${formatUsd(total)}</div>
            <div class="portfolio-change ${changePct >= 0 ? "up" : "down"}">
              ${changePct >= 0 ? "▲" : "▼"} ${Math.abs(changePct).toFixed(2)}% · visual estimate
            </div>
          </div>
          <div class="card-body">
            <div class="chart-wrap">
              <svg class="chart-svg" viewBox="0 0 320 140" preserveAspectRatio="none">
                <path d="${path}" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"></path>
              </svg>
              <div class="chart-labels">
                <span>7d ago</span>
                <span>now</span>
              </div>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-header">
            <h3 class="card-title">Holdings breakdown</h3>
            <p class="card-desc">Desglose de monedas detectadas en tus wallets agregadas.</p>
          </div>
          <div class="card-body">
            <div class="tabs">
              ${["All", "Solana", "Ethereum", "Bitcoin"]
                .map(
                  chain => `
                <button class="tab-btn ${state.selectedChain === chain ? "active" : ""}" onclick="setChain('${chain}')">
                  ${chain}
                </button>
              `
                )
                .join("")}
            </div>
          </div>
        </div>

        ${
          filteredAssets.length === 0
            ? `
          <div class="empty">
            <div class="empty-icon">◈</div>
            <h3>Sin balances visibles</h3>
            <p>No pude extraer monedas con valor o cantidad desde la respuesta actual del worker para este filtro.</p>
          </div>
        `
            : `
          <div class="asset-list">
            ${filteredAssets
              .map(asset => {
                const pct = total > 0 ? (asset.value / total) * 100 : 0;
                return `
                  <div class="asset-row">
                    <div class="asset-top">
                      <div>
                        <div class="asset-name">
                          <span>${escapeHtml(asset.name)}</span>
                          <span class="badge">${escapeHtml(asset.chain)}</span>
                        </div>
                        <div class="asset-symbol">${escapeHtml(asset.symbol)}</div>
                      </div>
                      <div class="asset-right">
                        <div class="asset-value">${asset.value > 0 ? formatUsd(asset.value) : "No price"}</div>
                        <div class="asset-amount">${formatAmount(asset.amount)} ${escapeHtml(asset.symbol)}</div>
                      </div>
                    </div>

                    <div class="asset-bar">
                      <div class="asset-bar-fill" style="width:${Math.max(2, pct)}%"></div>
                    </div>

                    <div class="asset-footer">
                      <span>${pct.toFixed(2)}% del portafolio</span>
                      <span>${asset.price > 0 ? formatUsd(asset.price) + " price" : "No price feed"}</span>
                    </div>
                  </div>
                `;
              })
              .join("")}
          </div>
        `
        }
      `;
    }

    function renderWatchlist() {
      const watchers = getFilteredWatchers();

      return `
        <div class="card">
          <div class="card-header">
            <h3 class="card-title">Add wallet watcher</h3>
            <p class="card-desc">Register a public address for testing</p>
          </div>
          <div class="card-body">
            <div class="field">
              <label>Alias</label>
              <input
                class="input"
                placeholder="Alias"
                value="${escapeHtml(state.newWatcher.alias)}"
                oninput="updateFormField('alias', this.value)"
              />
            </div>

            <div class="field">
              <label>Public wallet address</label>
              <input
                class="input"
                placeholder="Public wallet address"
                value="${escapeHtml(state.newWatcher.address)}"
                oninput="updateFormField('address', this.value)"
              />
            </div>

            <div class="chain-grid">
              ${["Solana", "Ethereum", "Bitcoin"]
                .map(
                  chain => `
                <button class="chain-btn ${state.newWatcher.chain === chain ? "active" : ""}" onclick="setFormChain('${chain}')">
                  ${chain}
                </button>
              `
                )
                .join("")}
            </div>

            <button class="btn white" style="width:100%;margin-top:14px" onclick="saveWatcher()" ${state.loading ? "disabled" : ""}>
              ${state.loading ? "Consultando..." : "＋ Save watcher"}
            </button>

            ${state.formError ? `<div class="error">${escapeHtml(state.formError)}</div>` : ""}
            ${state.showSaved ? `<div class="success">Wallet guardada correctamente.</div>` : ""}
          </div>
        </div>

        ${
          watchers.length === 0
            ? `
          <div class="empty">
            <div class="empty-icon">◈</div>
            <h3>No wallets tracked</h3>
            <p>Todavía no hay ninguna wallet en la watchlist. Agrega la primera arriba.</p>
          </div>
        `
            : `
          <div class="wallet-list">
            ${watchers
              .map(
                wallet => `
              <div class="wallet-item">
                <div class="wallet-top">
                  <div class="wallet-main">
                    <div class="wallet-name">
                      <span>${escapeHtml(wallet.alias)}</span>
                      <span class="badge">${escapeHtml(wallet.chain)}</span>
                    </div>
                    <div class="wallet-address">${escapeHtml(wallet.address)}</div>
                  </div>
                  <div class="wallet-actions">
                    <button class="icon-btn">›</button>
                    <button class="icon-btn" onclick="deleteWatcher('${wallet.address}','${wallet.chain}')">🗑</button>
                  </div>
                </div>

                <div class="wallet-meta">
                  <div class="meta-box">
                    <div class="meta-label">12h change</div>
                    <div class="meta-value" style="color:${wallet.change >= 0 ? "var(--ok)" : "var(--bad)"}">
                      ${wallet.change >= 0 ? "+" : ""}${wallet.change}%
                    </div>
                  </div>
                  <div class="meta-box">
                    <div class="meta-label">Updated</div>
                    <div class="meta-value">${escapeHtml(wallet.updated)}</div>
                  </div>
                </div>

                <div class="worker-note">
                  ${escapeHtml(wallet.lastAction)}
                  ${
                    wallet.rawData
                      ? `<br><span class="muted">Worker conectado · ${escapeHtml(wallet.rawData.chain || wallet.chain)}</span>`
                      : ""
                  }
                </div>
              </div>
            `
              )
              .join("")}
          </div>
        `
        }
      `;
    }

    function renderSummary() {
      const hasWallets = state.watchers.length > 0;

      return `
        <div class="card">
          <div class="card-header">
            <h3 class="card-title">Next snapshot</h3>
            <p class="card-desc">Portfolio and watched wallets refresh every 12 hours</p>
          </div>
          <div class="card-body">
            <div style="font-size:40px;font-weight:700">04:21:17</div>
            <button class="btn white" style="width:100%;margin-top:16px">⟳ Force preview refresh</button>
          </div>
        </div>

        ${
          !hasWallets
            ? `
          <div class="empty">
            <div class="empty-icon">◈</div>
            <h3>No hay resumen aún</h3>
            <p>Los resúmenes de 12 horas aparecerán cuando exista al menos una wallet agregada.</p>
          </div>
        `
            : `
          <div class="card">
            <div class="card-header">
              <h3 class="card-title">Protocol notes</h3>
              <p class="card-desc">Scope locked for V1</p>
            </div>
            <div class="card-body" style="display:grid;gap:10px">
              <div class="meta-box">Read-only wallet tracking</div>
              <div class="meta-box">Chains: Solana, Ethereum, Bitcoin</div>
              <div class="meta-box">Refresh cadence: every 12 hours</div>
              <div class="meta-box">No swaps, no custody, no signatures</div>
            </div>
          </div>
        `
        }
      `;
    }

    function render() {
      document.getElementById("dashboardScreen").innerHTML = renderDashboard();
      document.getElementById("portfolioScreen").innerHTML = renderPortfolio();
      document.getElementById("watchlistScreen").innerHTML = renderWatchlist();
      document.getElementById("summaryScreen").innerHTML = renderSummary();

      document.getElementById("searchInput").value = state.query;
      document.getElementById("headerAddBtn").onclick = () => setScreen("watchlist");
    }

    document.getElementById("searchInput").addEventListener("input", (e) => {
      state.query = e.target.value;
      render();
    });

    document.querySelectorAll(".nav-btn").forEach(btn => {
      btn.addEventListener("click", () => setScreen(btn.dataset.screen));
    });

    window.setScreen = setScreen;
    window.setChain = setChain;
    window.setFormChain = setFormChain;
    window.updateFormField = updateFormField;
    window.saveWatcher = saveWatcher;
    window.deleteWatcher = deleteWatcher;

    (async function init() {
      await refreshPriceCache();
      render();
    })();
  </script>
</body>
</html>
